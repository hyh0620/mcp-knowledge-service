# MCP Knowledge Service example configuration.
# Copy this file to config/settings.yaml for local runs.
# Secrets are read from environment variables or an ignored local .env file.

llm:
  provider: "openai"
  model: "${DASHSCOPE_CHAT_MODEL}"
  api_key: "${DASHSCOPE_API_KEY}"
  base_url: "${DASHSCOPE_BASE_URL}"
  temperature: 0.0
  max_tokens: 2048

embedding:
  provider: "openai"
  model: "${DASHSCOPE_EMBEDDING_MODEL}"
  dimensions: 1024
  api_key: "${DASHSCOPE_API_KEY}"
  base_url: "${DASHSCOPE_BASE_URL}"

vision_llm:
  enabled: false
  provider: "openai"
  model: "${DASHSCOPE_CHAT_MODEL}"
  api_key: "${DASHSCOPE_API_KEY}"
  base_url: "${DASHSCOPE_BASE_URL}"
  max_image_size: 2048

vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

rerank:
  enabled: false
  provider: "none"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

ingestion:
  chunk_size: 650
  chunk_overlap: 80
  splitter: "recursive"
  batch_size: 10
  chunk_refiner:
    use_llm: false
  metadata_enricher:
    use_llm: false
