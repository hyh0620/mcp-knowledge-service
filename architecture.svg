<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MCP Knowledge Service 系统架构</title>
  <desc id="desc">两阶段架构图。上半部分展示从 Markdown 维护源和 PDF 输入到文档导入、文本切分、向量嵌入、ChromaDB、BM25 与命名知识集合的离线准备；下半部分展示通过 stdio JSON-RPC、MCP tools、混合检索、RRF 和来源引用完成的在线查询。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6d28d9"/>
    </marker>
    <style>
      .page { fill: #f8fafc; }
      .prep-lane { fill: #ecfdf5; stroke: #bbf7d0; stroke-width: 2; }
      .serve-lane { fill: #fff7ed; stroke: #fed7aa; stroke-width: 2; }
      .doc { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .pipeline { fill: #ffffff; stroke: #475569; stroke-width: 2.5; }
      .store { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; }
      .server { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; }
      .client { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .tool { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; }
      .result { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .note { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .title { font: 700 30px sans-serif; fill: #0f172a; }
      .subtitle { font: 16px sans-serif; fill: #475569; }
      .lane-title { font: 700 22px sans-serif; fill: #0f172a; }
      .node-title { font: 700 19px sans-serif; fill: #0f172a; }
      .node-cn { font: 15px sans-serif; fill: #334155; }
      .small { font: 14px sans-serif; fill: #475569; }
      .tiny { font: 12px sans-serif; fill: #64748b; }
      .arrow { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-orange { fill: none; stroke: #ea580c; stroke-width: 3; marker-end: url(#arrow-orange); }
      .arrow-purple { fill: none; stroke: #6d28d9; stroke-width: 3; marker-end: url(#arrow-purple); }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="60" y="60">MCP Knowledge Service</text>
  <text class="subtitle" x="60" y="88">基于 collection 的文档导入、混合检索与来源引用</text>

  <rect class="prep-lane" x="55" y="125" width="1490" height="315" rx="18"/>
  <text class="lane-title" x="85" y="165">离线知识准备 / Knowledge Preparation</text>

  <rect class="serve-lane" x="55" y="485" width="1490" height="325" rx="18"/>
  <text class="lane-title" x="85" y="525">在线 MCP 查询服务 / Query Serving</text>

  <rect class="doc" x="95" y="230" width="210" height="105" rx="12"/>
  <text class="node-title" x="143" y="265">知识源文件</text>
  <text class="small" x="128" y="293">Markdown 源 · PDF 输入</text>

  <rect class="pipeline" x="365" y="220" width="230" height="125" rx="12"/>
  <text class="node-title" x="422" y="255">文档导入</text>
  <text class="small" x="414" y="283">PDF load · extract</text>
  <text class="small" x="420" y="309">normalize / 标准化</text>

  <rect class="pipeline" x="660" y="230" width="190" height="105" rx="12"/>
  <text class="node-title" x="716" y="265">文本切分</text>
  <text class="node-cn" x="720" y="293">Chunking</text>

  <rect class="store" x="930" y="170" width="230" height="95" rx="12"/>
  <text class="node-title" x="1005" y="205">向量嵌入</text>
  <text class="small" x="1010" y="233">Embedding</text>

  <rect class="store" x="930" y="300" width="230" height="95" rx="12"/>
  <text class="node-title" x="979" y="335">BM25 关键词索引</text>
  <text class="small" x="1000" y="363">Sparse Retrieval</text>

  <rect class="store" x="1225" y="165" width="245" height="115" rx="12"/>
  <text class="node-title" x="1273" y="200">ChromaDB 向量库</text>
  <text class="small" x="1300" y="229">Dense Retrieval</text>

  <rect class="result" x="1225" y="315" width="245" height="105" rx="12"/>
  <text class="node-title" x="1286" y="348">命名知识集合</text>
  <text class="small" x="1290" y="374">knowledge_hub</text>
  <text class="small" x="1265" y="398">salon_knowledge (example)</text>

  <rect class="note" x="1055" y="405" width="380" height="52" rx="10"/>
  <text class="tiny" x="1082" y="425">collection 隔离不同领域的检索数据</text>
  <text class="tiny" x="1082" y="443">runtime indexes 保留本地，不提交 Git</text>

  <path class="arrow" d="M305 282 L365 282"/>
  <path class="arrow" d="M595 282 L660 282"/>
  <path class="arrow" d="M850 282 C890 282 890 218 930 218"/>
  <path class="arrow" d="M850 282 C890 282 890 348 930 348"/>
  <path class="arrow" d="M1160 218 L1225 222"/>
  <path class="arrow" d="M1160 348 L1225 368"/>
  <path class="arrow" d="M1348 280 L1348 315"/>

  <rect class="client" x="95" y="610" width="210" height="105" rx="12"/>
  <text class="node-title" x="151" y="645">业务应用</text>
  <text class="small" x="139" y="673">MCP Client / 客户端</text>

  <rect class="tool" x="365" y="610" width="190" height="105" rx="12"/>
  <text class="node-title" x="403" y="645">stdio JSON-RPC</text>
  <text class="tiny" x="399" y="672">stdout: MCP 协议</text>
  <text class="tiny" x="417" y="692">stderr: 日志</text>

  <rect class="server" x="625" y="565" width="300" height="190" rx="12"/>
  <text class="node-title" x="704" y="600">MCP 知识服务</text>
  <text class="node-cn" x="700" y="626">MCP Server / 服务端</text>
  <text class="small" x="694" y="654">暴露 MCP Tools:</text>
  <text class="tiny" x="683" y="680">query_knowledge_hub</text>
  <text class="tiny" x="708" y="701">list_collections</text>
  <text class="tiny" x="692" y="722">get_document_summary</text>

  <rect class="tool" x="995" y="590" width="220" height="105" rx="12"/>
  <text class="node-title" x="1028" y="625">query_knowledge_hub</text>
  <text class="small" x="1048" y="652">Tool Call / 工具调用</text>

  <rect class="tool" x="1265" y="535" width="220" height="95" rx="12"/>
  <text class="node-title" x="1300" y="570">Dense + BM25</text>
  <text class="small" x="1322" y="598">混合检索</text>

  <rect class="tool" x="1265" y="680" width="220" height="82" rx="12"/>
  <text class="node-title" x="1312" y="713">RRF 排名融合</text>
  <text class="small" x="1310" y="740">ranked context / 排序</text>

  <rect class="result" x="1050" y="790" width="340" height="82" rx="12"/>
  <text class="node-title" x="1112" y="822">带来源引用的检索结果</text>
  <text class="node-cn" x="1138" y="848">Retrieved Result · Citations</text>

  <path class="arrow-orange" d="M305 662 L365 662"/>
  <path class="arrow-orange" d="M555 662 L625 662"/>
  <path class="arrow-purple" d="M925 662 L995 643"/>
  <path class="arrow-purple" d="M1215 643 L1265 583"/>
  <path class="arrow-purple" d="M1375 630 L1375 680"/>
  <path class="arrow-purple" d="M1265 721 C1195 721 1195 790 1220 790"/>
</svg>
